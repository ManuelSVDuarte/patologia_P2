<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Simulados</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            color: #1a1a1a;
        }

        p {
            margin-bottom: 30px;
            color: #666;
        }

        .botoes-container {
            display: flex;
            flex-direction: column; /* Alterado para empilhar os botões */
            gap: 15px; /* Espaçamento entre os botões */
            justify-content: center;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* Estilo para o botão Teórico 1 */
        .btn-teorico {
            background-color: #0056b3;
            border: 2px solid #0056b3;
        }

        .btn-teorico:hover {
            background-color: #ffffff;
            color: #0056b3;
        }

        /* Estilo para o botão Teórico 2 */
        .btn-teorico-2 {
            background-color: #6f42c1; /* Cor roxa para diferenciar */
            border: 2px solid #6f42c1;
        }

        .btn-teorico-2:hover {
            background-color: #ffffff;
            color: #6f42c1;
        }

        /* Estilo para o botão Prático */
        .btn-pratico {
            background-color: #28a745;
            border: 2px solid #28a745;
        }

        .btn-pratico:hover {
            background-color: #ffffff;
            color: #28a745;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Plataforma de Simulados</h1>
        <p>Selecione a modalidade que deseja treinar agora:</p>
        
        <div class="botoes-container">
            <a href="teorico.html" class="btn btn-teorico">Simulado Teórico 1</a>
            <a href="teorico_2.html" class="btn btn-teorico-2">Simulado Teórico 2</a>
            <a href="pratico.html" class="btn btn-pratico">Simulado Prático</a>
        </div>
    </div>

</body>
</html>
